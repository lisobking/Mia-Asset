services:
  - type: web
    name: ag-bot-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        value: Z3V6Y21uZGtvamVocWxzY21ueGthaG9wcWtqZGZncG0=
